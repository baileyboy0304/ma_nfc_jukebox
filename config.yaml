name: "MA NFC Jukebox"
version: "1.3.1"
slug: ma_nfc_jukebox
description: "NFC-tag guest jukebox: guests share Spotify playlists, playback runs through Music Assistant on any player it controls."
url: "https://github.com/baileyboy0304/ma_nfc_jukebox"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
# Networking: ingress gives YOU (already logged into Home Assistant) a
# sidebar panel showing the live "current guest" screen. Guests tapping the
# NFC tag are never logged into HA, so they always use the direct port
# instead (see docs/callback/index.html for how the OAuth callback works).
# All internal links/redirects are relative so the same pages work correctly
# whether loaded through the ingress path prefix or the direct port.
ingress: true
ingress_port: 9016
panel_icon: mdi:nfc-tap
panel_title: NFC Jukebox
ports:
  9016/tcp: 9016
ports_description:
  9016/tcp: "Web UI + guest Spotify OAuth callback"
map:
  - addon_config:rw
init: false
options:
  # --- Music Assistant (same keys as the NewLyricsJukebox add-on) ---
  music_assistant_base_url: ""
  music_assistant_token: ""
  music_assistant_player_id: ""
  # --- Spotify (guest login only; playback runs through Music Assistant) ---
  spotify_client_id: ""
  spotify_client_secret: ""
  # --- General ---
  log_level: "INFO"
schema:
  music_assistant_base_url: str?
  music_assistant_token: str?
  music_assistant_player_id: str?
  spotify_client_id: str?
  spotify_client_secret: str?
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
