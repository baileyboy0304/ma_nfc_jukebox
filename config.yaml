name: "MA NFC Jukebox"
version: "1.1.1"
slug: ma_nfc_jukebox
description: "NFC-tag guest jukebox: guests share Spotify playlists, playback runs through Music Assistant on any player it controls."
url: "https://github.com/baileyboy0304/ma_nfc_jukebox"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
# Networking: no ingress/sidebar panel -- ingress is only reachable by
# someone already logged into Home Assistant, but guests tapping the NFC tag
# never are, and the pages they need (/join, /callback, /player) have to go
# through the direct port regardless (see docs/callback/index.html for how
# the OAuth callback works). So everyone, including you, just uses the
# direct port: http://<host>:9015.
#
# The web UI port (9015) is fixed to match the app's internal bind, so there
# is no server_port option.
ports:
  9015/tcp: 9015
ports_description:
  9015/tcp: "Web UI + guest Spotify OAuth callback"
map:
  - addon_config:rw
init: false
options:
  # --- Music Assistant (same keys as the NewLyricsJukebox add-on) ---
  music_assistant_base_url: ""
  music_assistant_token: ""
  music_assistant_player_id: ""
  # --- Spotify (guest login only; playback runs through Music Assistant) ---
  spotify_client_id: ""
  spotify_client_secret: ""
  # --- General ---
  log_level: "INFO"
schema:
  music_assistant_base_url: str?
  music_assistant_token: str?
  music_assistant_player_id: str?
  spotify_client_id: str?
  spotify_client_secret: str?
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
